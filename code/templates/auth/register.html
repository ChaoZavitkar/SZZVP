{% extends "base.html" %}

{% block title %}Registrace - NerdMatch{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Nový účet</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Heslo:</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                        <small class="form-text text-muted d-block mt-2">
                            ✓ Alespoň 8 znaků<br>
                            ✓ Malé a velké písmeno<br>
                            ✓ Číslo<br>
                            ✓ Speciální znak (!@#$...)
                        </small>
                    </div>
                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">Potvrzení hesla:</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Vytvořit účet</button>
                </form>
                <hr>
                <p class="text-center">Již máte účet? <a href="/login">Přihlaste se</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
